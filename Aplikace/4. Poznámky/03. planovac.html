<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Plánovač událostí</title>
  <style>
    body { font-family: sans-serif;
padding: 2rem; background: #000; color: #fff; }
    table { border-collapse: collapse; width: 100%; background: #111; color: #fff;
}
    th, td { border: 1px solid #555; padding: 0.5rem; text-align: center;
}
    th { background: #222; }
    button { padding: 0.5rem; margin: 0.2rem; border: none;
font-weight: bold; cursor: pointer; border-radius: 5px; }
    .add { background-color: #4caf50; color: #fff;
}
    .edit { background-color: #2196f3; color: #fff; }
    .remove { background-color: #f44336; color: #fff;
}
    .export { background-color: #ff9800; color: #000; }
    .export-txt { background-color: #ffc107; color: #000;
}
    .form-section, .filter { margin: 1rem 0;
}
    input[type="text"], input[type="date"], input[type="time"], textarea { padding: 0.5rem; width: 200px; margin: 0.2rem;
}
    textarea { width: calc(100% - 0.4rem); height: 80px; } /* Pro popisek události */
    .hidden { display: none; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111;
border: 2px solid #555; padding: 1rem; z-index: 1000; border-radius: 10px; display: none;
}
    .modal input, .modal textarea { margin: 0.2rem; width: 90%; }
    .overlay { position: fixed;
top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: none; z-index: 999;
}
  </style>
</head>
<body>
  <h1>Plánovač událostí</h1>

  <div class="form-section">
    <button onclick="exportEvents()">Exportovat JSON</button>
    <label>
      Importovat JSON:
      <input type="file" onchange="importEvents(event)" />
    </label>
  </div>

  <div class="form-section">
    <h3>Přidat novou událost</h3>
    <input type="date" id="eventDate" title="Datum události" />
    <input type="time" id="eventTime" title="Čas události" />
    <input type="text" id="eventTitle" placeholder="Název události (např. Kontrola, Schůzka)" />
    <textarea id="eventDescription" placeholder="Popis události / Poznámky"></textarea>
    <button onclick="addEvent()">Přidat událost</button>
  </div>

  <div class="filter">
    <input type="text" id="filterInput" placeholder="Filtruj události..." oninput="updateTable()" />
    <button onclick="clearFilter()">Zrušit filtr</button>
  </div>

  <table id="eventsTable">
    <thead>
      <tr>
        <th>Datum</th>
        <th>Čas</th>
        <th>Název</th>
        <th>Popis</th>
        <th>Akce</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="overlay" id="overlay"></div>
  <div class="modal" id="editModal"></div>

  <script>
    let events = [];

    function showModal(contentHTML) {
      const overlay = document.getElementById('overlay');
      const modal = document.getElementById('editModal');
      modal.innerHTML = contentHTML;
      overlay.style.display = 'block';
      modal.style.display = 'block';
    }

    function closeModal() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('editModal').style.display = 'none';
    }

    function addEvent() {
      const date = document.getElementById('eventDate').value;
      const time = document.getElementById('eventTime').value;
      const title = document.getElementById('eventTitle').value.trim();
      const description = document.getElementById('eventDescription').value.trim();

      if (!date || !time || !title) {
        alert('Prosím, vyplňte Datum, Čas a Název události.');
        return;
      }

      events.push({
        date: date,
        time: time,
        title: title,
        description: description
      });

      // Vyprázdní formulář po přidání
      document.getElementById('eventDate').value = '';
      document.getElementById('eventTime').value = '';
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventDescription').value = '';

      updateTable(); // Aktualizuje tabulku po přidání nové události
    }

    function editEvent(index) {
      const event = events[index];
      showModal(`
        <h3>Upravit událost</h3>
        <input type="date" id="editEventDate" value="${event.date}" /><br>
        <input type="time" id="editEventTime" value="${event.time}" /><br>
        <input type="text" id="editEventTitle" value="${event.title}" placeholder="Název události" /><br>
        <textarea id="editEventDescription" placeholder="Popis události / Poznámky">${event.description}</textarea><br>
        <button onclick="submitEditEvent(${index})">Uložit</button>
        <button onclick="closeModal()">Zrušit</button>
      `);
    }

    function submitEditEvent(index) {
      const event = events[index];
      event.date = document.getElementById('editEventDate').value;
      event.time = document.getElementById('editEventTime').value;
      event.title = document.getElementById('editEventTitle').value.trim();
      event.description = document.getElementById('editEventDescription').value.trim();
      closeModal();
      updateTable();
    }

    function deleteEvent(index) {
      if (confirm('Opravdu chcete odstranit tuto událost?')) {
        events.splice(index, 1);
        updateTable();
      }
    }

    function updateTable() {
      const tbody = document.querySelector('#eventsTable tbody');
      tbody.innerHTML = '';
      const filter = document.getElementById('filterInput').value.toLowerCase();

      // Seřadíme události podle data a času pro lepší přehlednost
      const sortedEvents = [...events].sort((a, b) => {
        const dateTimeA = new Date(`${a.date}T${a.time}`);
        const dateTimeB = new Date(`${b.date}T${b.time}`);
        return dateTimeA - dateTimeB;
      });

      sortedEvents.forEach((event, index) => {
        // Najdeme původní index události v nesetříděném poli pro správné akce
        const originalIndex = events.findIndex(e => e === event);

        // Filtr podle názvu, popisu, data nebo času
        if (event.title.toLowerCase().includes(filter) ||
            event.description.toLowerCase().includes(filter) ||
            event.date.includes(filter) || // Datum je ve formátu YYYY-MM-DD
            event.time.includes(filter)) {

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${formatDateForDisplay(event.date)}</td>
            <td>${event.time}</td>
            <td>${event.title}</td>
            <td>${event.description}</td>
            <td>
              <button class="edit" onclick="editEvent(${originalIndex})">Upravit</button>
              <button class="remove" onclick="deleteEvent(${originalIndex})">Odstranit</button>
            </td>
          `;
          tbody.appendChild(row);
        }
      });
    }

    // Pomocná funkce pro formátování data pro zobrazení
    function formatDateForDisplay(dateString) {
        if (!dateString) return '';
        const [year, month, day] = dateString.split('-');
        return `${day}.${month}.${year}`;
    }

    function clearFilter() {
      document.getElementById('filterInput').value = '';
      updateTable();
    }

    function exportEvents() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(events));
      const dl = document.createElement('a');
      dl.setAttribute("href", dataStr);
      dl.setAttribute("download", "planovac.json");
      dl.click();
    }

    function importEvents(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const importedData = JSON.parse(e.target.result);
          if (Array.isArray(importedData) && importedData.every(item => 'date' in item && 'time' in item && 'title' in item && 'description' in item)) {
            events = importedData;
            updateTable();
            alert('Data plánovače byla úspěšně importována!');
          } else {
            alert('Chyba: Importovaný soubor nemá očekávaný formát pro plánovač.');
          }
        } catch (e) {
          alert('Chyba při čtení JSON souboru: ' + e.message);
        }
      };
      reader.readAsText(file);
    }

    updateTable(); // Zobrazí tabulku při načtení
  </script>
</body>
</html>
