<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Poznámky</title>
  <style>
    body { font-family: sans-serif;
padding: 2rem; background: #000; color: #fff; }
    table { border-collapse: collapse; width: 100%; background: #111; color: #fff;
}
    th, td { border: 1px solid #555; padding: 0.5rem; text-align: center;
}
    th { background: #222; }
    button { padding: 0.5rem; margin: 0.2rem; border: none;
font-weight: bold; cursor: pointer; border-radius: 5px; }
    .add { background-color: #4caf50; color: #fff;
}
    .edit { background-color: #2196f3; color: #fff; }
    .remove { background-color: #f44336; color: #fff;
}
    .export { background-color: #ff9800; color: #000; }
    .export-txt { background-color: #ffc107; color: #000;
}
    .form-section, .filter { margin: 1rem 0;
}
    input[type="text"], textarea { padding: 0.5rem; width: 100%; margin: 0.2rem;
}
    textarea { height: 150px; }
    .hidden { display: none; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111;
border: 2px solid #555; padding: 1rem; z-index: 1000; border-radius: 10px; display: none;
}
    .modal input, .modal textarea { margin: 0.2rem; width: 90%; }
    .overlay { position: fixed;
top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: none; z-index: 999;
}
  </style>
</head>
<body>
  <h1>Poznámky</h1>

  <div class="form-section">
    <button onclick="exportAllNotes()">Exportovat JSON</button>
    <label>
      Importovat JSON:
      <input type="file" onchange="importNotes(event)" />
    </label>
  </div>

  <div class="form-section">
    <h3>Přidat poznámku</h3>
    <input type="text" id="noteTitle" placeholder="Název poznámky" />
    <textarea id="noteText" placeholder="Poznámka"></textarea>
    <button onclick="addNote()">Přidat</button>
  </div>

  <div class="filter">
    <input type="text" id="filterInput" placeholder="Filtruj poznámky..." oninput="updateTable()" />
    <button onclick="clearFilter()">Zrušit filtr</button>
  </div>

  <table id="notesTable">
    <thead>
      <tr>
        <th>Název poznámky</th>
        <th>Akce</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="overlay" id="overlay"></div>
  <div class="modal" id="editModal"></div>

  <script>
    let notes = [];

    function showModal(contentHTML) {
      const overlay = document.getElementById('overlay');
      const modal = document.getElementById('editModal');
      modal.innerHTML = contentHTML;
      overlay.style.display = 'block';
      modal.style.display = 'block';
    }

    function closeModal() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('editModal').style.display = 'none';
    }

    function addNote() {
      const title = document.getElementById('noteTitle').value;
      const text = document.getElementById('noteText').value;

      if (!title || !text) {
        alert('Prosím, vyplňte název i text poznámky.');
        return;
      }

      notes.push({
        title: title,
        text: text
      });

      document.getElementById('noteTitle').value = '';
      document.getElementById('noteText').value = '';

      updateTable();
    }

    function viewNote(index) {
      const note = notes[index];
      showModal(`
        <h3>${note.title}</h3>
        <p>${note.text.replace(/\n/g, '<br>')}</p>
        <button onclick="closeModal()">Zavřít</button>
      `);
    }

    function editNote(index) {
      const note = notes[index];
      showModal(`
        <h3>Upravit poznámku</h3>
        <input type="text" id="editTitle" value="${note.title}" placeholder="Název poznámky" /><br>
        <textarea id="editText" placeholder="Poznámka">${note.text}</textarea><br>
        <button onclick="submitEditNote(${index})">Uložit</button>
        <button onclick="closeModal()">Zrušit</button>
      `);
    }

    function submitEditNote(index) {
      const note = notes[index];
      note.title = document.getElementById('editTitle').value;
      note.text = document.getElementById('editText').value;
      closeModal();
      updateTable();
    }

    function deleteNote(index) {
      if (confirm('Opravdu chcete odstranit tuto poznámku?')) {
        notes.splice(index, 1);
        updateTable();
      }
    }

    function exportNoteToTxt(index) {
      const note = notes[index];
      const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(`${note.title}\n\n${note.text}`);
      const dl = document.createElement('a');
      dl.setAttribute("href", dataStr);
      dl.setAttribute("download", `${note.title.replace(/[^a-z0-9]/gi, '_')}.txt`); // Bezpečný název souboru
      dl.click();
    }

    function updateTable() {
      const tbody = document.querySelector('#notesTable tbody');
      tbody.innerHTML = '';
      const filter = document.getElementById('filterInput').value.toLowerCase();

      notes.forEach((note, index) => {
        if (note.title.toLowerCase().includes(filter) || note.text.toLowerCase().includes(filter)) {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td><a href="#" onclick="viewNote(${index})">${note.title}</a></td>
            <td>
              <button class="edit" onclick="editNote(${index})">Upravit</button>
              <button class="remove" onclick="deleteNote(${index})">Smazat</button>
              <button class="export-txt" onclick="exportNoteToTxt(${index})">Export do TXT</button>
            </td>
          `;
          tbody.appendChild(row);
        }
      });
    }

    function exportAllNotes() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes));
      const dl = document.createElement('a');
      dl.setAttribute("href", dataStr);
      dl.setAttribute("download", "poznamky.json");
      dl.click();
    }

    function importNotes(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const importedData = JSON.parse(e.target.result);
          if (Array.isArray(importedData) && importedData.every(item => 'title' in item && 'text' in item)) {
            notes = importedData;
            updateTable();
            alert('Data byla úspěšně importována!');
          } else {
            alert('Chyba: Importovaný soubor nemá očekávaný formát pro poznámky.');
          }
        } catch (e) {
          alert('Chyba při čtení JSON souboru: ' + e.message);
        }
      };
      reader.readAsText(file);
    }

    updateTable();
  </script>
</body>
</html>
