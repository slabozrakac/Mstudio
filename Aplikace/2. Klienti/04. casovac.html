<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Masážní časovač</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 2rem; }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    .buttons button, .control button {
      margin: 0.5rem; padding: 1rem 2rem; font-size: 1.2rem; border: none;
      border-radius: 10px; cursor: pointer; font-weight: bold;
    }
    .preset { background: #4caf50; color: #fff; }
    .custom { background: #2196f3; color: #fff; }
    .control button { background: #ff9800; color: #000; }
    #timer { font-size: 5rem; margin: 2rem 0; font-weight: bold; letter-spacing: 2px; }
    input[type="number"] {
      padding: 0.5rem; font-size: 1rem; width: 100px;
    }
    #customSoundInput {
      margin-top: 1rem;
    }
    @media (max-width: 600px) {
      #timer { font-size: 3rem; }
      .buttons button, .control button { font-size: 1rem; padding: 0.8rem 1.2rem; }
    }
  </style>
</head>
<body>
  <h1>Masážní časovač</h1>

  <div class="buttons">
    <button class="preset" onclick="setTime(30)">30 min</button>
    <button class="preset" onclick="setTime(60)">60 min</button>
    <button class="preset" onclick="setTime(90)">90 min</button>
    <button class="preset" onclick="setTime(120)">120 min</button>
    <br>
    <input type="number" id="customMinutes" placeholder="Minuty" min="1">
    <button class="custom" onclick="setCustomTime()">Vlastní volba</button>
    <br>
    <input type="file" id="customSoundInput" accept="audio/*" onchange="loadCustomSound()">
  </div>

  <div id="timer">00:00:00</div>

  <div class="control">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pauza</button>
    <button onclick="stopTimer()">Zastavit</button>
  </div>

  <audio id="alarm"></audio>

  <script>
    let timer;
    let remainingSeconds = 0;
    let isPaused = false;
    let customSoundURL = null;

    function setTime(minutes) {
      remainingSeconds = minutes * 60;
      updateDisplay();
    }

    function setCustomTime() {
      const mins = parseInt(document.getElementById('customMinutes').value);
      if (!isNaN(mins) && mins > 0) {
        setTime(mins);
      }
    }

    function updateDisplay() {
      const hrs = String(Math.floor(remainingSeconds / 3600)).padStart(2, '0');
      const mins = String(Math.floor((remainingSeconds % 3600) / 60)).padStart(2, '0');
      const secs = String(remainingSeconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${hrs}:${mins}:${secs}`;
    }

    function loadCustomSound() {
      const fileInput = document.getElementById('customSoundInput');
      const file = fileInput.files[0];
      if (file) {
        const alarm = document.getElementById('alarm');
        if (customSoundURL) {
          URL.revokeObjectURL(customSoundURL);
        }
        customSoundURL = URL.createObjectURL(file);
        alarm.src = customSoundURL;
      }
    }

    function startTimer() {
      if (remainingSeconds <= 0 || timer) return;
      isPaused = false;
      timer = setInterval(() => {
        if (!isPaused && remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          if (remainingSeconds === 0) {
            clearInterval(timer);
            timer = null;
            const alarm = document.getElementById('alarm');
            alarm.currentTime = 0;
            alarm.play().catch(err => console.warn("Chyba přehrávání zvuku:", err));
          }
        }
      }, 1000);
    }

    function pauseTimer() {
      isPaused = !isPaused;
    }

    function stopTimer() {
      clearInterval(timer);
      timer = null;
      remainingSeconds = 0;
      updateDisplay();
    }
  </script>
</body>
</html>
