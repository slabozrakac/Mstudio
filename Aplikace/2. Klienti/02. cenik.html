<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Ceník masáží</title>
  <style>
    body { font-family: sans-serif;
padding: 2rem; background: #000; color: #fff; }
    table { border-collapse: collapse; width: 100%; background: #111; color: #fff;
}
    th, td { border: 1px solid #555; padding: 0.5rem; text-align: center;
}
    th { background: #222; }
    button { padding: 0.5rem; margin: 0.2rem; border: none;
font-weight: bold; cursor: pointer; border-radius: 5px; }
    .add { background-color: #4caf50; color: #fff;
}
    .edit { background-color: #2196f3; color: #fff; }
    .remove { background-color: #f44336; color: #fff;
}
    .export { background-color: #ff9800; color: #000; }
    .export-txt { background-color: #ffc107; color: #000; /* Nový styl pro export TXT tlačítko */
}
    .form-section, .filter { margin: 1rem 0;
}
    input[type="text"], input[type="tel"], input[type="number"] { padding: 0.5rem; width: 200px; margin: 0.2rem;
}
    .hidden { display: none; }
    /* Tyto styly se teď nepoužívají, ale necháme je tam pro jistotu, pokud bys je chtěl v budoucnu*/
    .massage-history { background-color: #222; margin-top: 0.5rem; padding: 0.5rem;
border-radius: 5px; }
    .history-entry { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.2rem;
}
    .history-entry span { flex-grow: 1; }
    .history-entry button { margin-left: 0.5rem;
}
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111;
border: 2px solid #555; padding: 1rem; z-index: 1000; border-radius: 10px; display: none;
}
    .modal input { margin: 0.2rem; width: 90%; }
    .overlay { position: fixed;
top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: none; z-index: 999;
}
  </style>
</head>
<body>
  <h1>Ceník masáží</h1>

  <div class="form-section">
    <button onclick="exportAllItems()">Exportovat JSON</button>
    <label>
      Importovat JSON:
      <input type="file" onchange="importItems(event)" />
    </label>
  </div>

  <div class="form-section">
    <h3>Přidat položku</h3>
    <input type="number" id="itemYear" placeholder="Rok (např. 2025)" />
    <input type="text" id="itemType" placeholder="Typ (např. K1)" />
    <input type="text" id="itemName" placeholder="Název masáže (např. Klasická masáž)" />
    <input type="text" id="itemLength" placeholder="Délka (např. 30 minut)" />
    <input type="number" id="itemPrice" placeholder="Cena (např. 500)" />
    <button onclick="addItem()">Přidat</button>
  </div>

  <div class="filter">
    <input type="text" id="filterInput" placeholder="Filtruj položky..." oninput="updateTable()" />
    <button onclick="clearFilter()">Zrušit filtr</button>
  </div>

  <table id="priceListTable">
    <thead>
      <tr>
        <th>Rok</th>
        <th>Typ</th>
        <th>Masáž</th>
        <th>Délka</th>
        <th>Cena</th>
        <th>Počet</th>
        <th>Celkem</th>
        <th>Akce</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="overlay" id="overlay"></div>
  <div class="modal" id="editModal"></div>

  <script>
    let priceListItems = []; // Tady budeme ukládat naše položky ceníku

    function showModal(contentHTML) {
      const overlay = document.getElementById('overlay');
      const modal = document.getElementById('editModal');
      modal.innerHTML = contentHTML;
      overlay.style.display = 'block';
      modal.style.display = 'block';
    }

    function closeModal() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('editModal').style.display = 'none';
    }

    function addItem() {
      const year = document.getElementById('itemYear').value;
      const type = document.getElementById('itemType').value;
      const name = document.getElementById('itemName').value;
      const length = document.getElementById('itemLength').value;
      const price = parseFloat(document.getElementById('itemPrice').value);

      if (!year || !type || !name || !length || isNaN(price)) {
          alert('Prosím, vyplňte všechna pole (Rok, Typ, Název, Délka, Cena).');
          return;
      }

      priceListItems.push({
          year: year,
          type: type,
          name: name,
          length: length,
          price: price,
          count: 0,
          total: 0
      });

      document.getElementById('itemYear').value = '';
      document.getElementById('itemType').value = '';
      document.getElementById('itemName').value = '';
      document.getElementById('itemLength').value = '';
      document.getElementById('itemPrice').value = '';

      updateTable();
    }

    function addCount(index) {
        const item = priceListItems[index];
        showModal(`
            <h3>Zadat počet pro ${item.name}</h3>
            <input type="number" id="editCount" value="${item.count}" min="0" /><br>
            <button onclick="submitCount(${index})">Uložit</button>
            <button onclick="closeModal()">Zrušit</button>
        `);
    }

    function submitCount(index) {
        const item = priceListItems[index];
        const newCount = parseInt(document.getElementById('editCount').value);

        if (isNaN(newCount) || newCount < 0) {
            alert('Prosím, zadejte platné kladné číslo pro počet.');
            return;
        }

        item.count = newCount;
        item.total = item.count * item.price;

        closeModal();
        updateTable();
    }

    function editItem(index) {
      const item = priceListItems[index];
      showModal(`
        <h3>Upravit položku ceníku</h3>
        <input type="number" id="editYear" value="${item.year}" /><br>
        <input type="text" id="editType" value="${item.type}" /><br>
        <input type="text" id="editName" value="${item.name}" /><br>
        <input type="text" id="editLength" value="${item.length}" /><br>
        <input type="number" id="editPrice" value="${item.price}" /><br>
        <button onclick="submitEditItem(${index})">Uložit</button>
        <button onclick="closeModal()">Zrušit</button>
      `);
    }

    function submitEditItem(index) {
      const item = priceListItems[index];
      item.year = document.getElementById('editYear').value;
      item.type = document.getElementById('editType').value;
      item.name = document.getElementById('editName').value;
      item.length = document.getElementById('editLength').value;
      
      const newPrice = parseFloat(document.getElementById('editPrice').value);
      if (!isNaN(newPrice)) {
          item.price = newPrice;
          item.total = item.count * item.price;
      } else {
          alert('Prosím, zadejte platné číslo pro cenu.');
          return;
      }
      
      closeModal();
      updateTable();
    }

    function deleteItem(index) {
      if (confirm('Opravdu chcete odstranit tuto položku?')) {
        priceListItems.splice(index, 1);
        updateTable();
      }
    }

    function updateTable() {
      const tbody = document.querySelector('#priceListTable tbody');
      tbody.innerHTML = '';
      const filter = document.getElementById('filterInput').value.toLowerCase();

      priceListItems.forEach((item, index) => {
        if (item.year.toString().includes(filter) ||
            item.type.toLowerCase().includes(filter) ||
            item.name.toLowerCase().includes(filter) ||
            item.length.toLowerCase().includes(filter) ||
            item.price.toString().includes(filter)) {

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.year}</td>
            <td>${item.type}</td>
            <td>${item.name}</td>
            <td>${item.length}</td>
            <td>${item.price} Kč</td>
            <td>${item.count}</td>
            <td>${item.total} Kč</td>
            <td>
              <button class="add" onclick="addCount(${index})">Přidat data</button>
              <button class="edit" onclick="editItem(${index})">Upravit</button>
              <button class="remove" onclick="deleteItem(${index})">Odstranit</button>
            </td>
          `;
          tbody.appendChild(row);
        }
      });
      // V případě, že bys chtěl mít tabulku vždy prázdnou při načtení, pokud neimportuješ:
      // Pokud chceš, aby po otevření souboru byla tabulka prázdná, tak tenhle řádek není potřeba.
      // Pokud chceš, aby se při prvním otevření po exportu JSONu tabulka naplnila, tak sem budeme muset
      // přidat kód pro automatický import při načtení stránky (to už známe z localStorage).
      // Ale vzhledem k tvému workflow s exportem/importem je to asi lepší nechat takto,
      // že začínáš s čistým štítem a data si naimportuješ.
    }

    // Přejmenované funkce pro export/import, aby to bylo jasnější
    function exportAllItems() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(priceListItems));
      const dl = document.createElement('a');
      dl.setAttribute("href", dataStr);
      dl.setAttribute("download", "cenik.json");
      dl.click();
    }

    function importItems(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        try {
            const importedData = JSON.parse(e.target.result);
            if (Array.isArray(importedData) && importedData.every(item => 'year' in item && 'type' in item && 'name' in item && 'price' in item)) {
                priceListItems = importedData;
                priceListItems.forEach(item => {
                    if (typeof item.count !== 'number') item.count = 0;
                    if (typeof item.total !== 'number') item.total = item.count * item.price;
                });
                updateTable();
                alert('Data byla úspěšně importována!');
            } else {
                alert('Chyba: Importovaný soubor nemá očekávaný formát pro ceník.');
            }
        } catch (e) {
            alert('Chyba při čtení JSON souboru: ' + e.message);
        }
      };
      reader.readAsText(file);
    }

    // Důležité: Načte tabulku při prvním spuštění, ale bude prázdná, dokud se nenaimportuje JSON
    updateTable();
  </script>
</body>
</html>
